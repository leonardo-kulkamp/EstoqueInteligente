<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Inteligente</title>
    <style>
        :root {
            --primary: #4f46e5;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        /* Painéis de Insights (A Inteligência do Estoque) */
        .insights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
        }

        .card .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary);
        }

        .card .detail {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 5px;
        }

        /* Formulário e Tabela */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .form-section, .table-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #4338ca;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .empty-msg {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Estoque Inteligente 🚀</h1>
        <p>Gerenciamento com insights automáticos</p>
    </header>

    <div class="insights">
        <div class="card" id="card-maior-estoque">
            <h3>Maior Estoque</h3>
            <div class="value" id="maior-qtd-nome">-</div>
            <div class="detail" id="maior-qtd-val">0 unidades</div>
        </div>
        <div class="card" id="card-mais-caro">
            <h3>Produto Mais Caro</h3>
            <div class="value" id="mais-caro-nome">-</div>
            <div class="detail" id="mais-caro-val">R$ 0,00</div>
        </div>
        <div class="card" id="card-mais-barato">
            <h3>Produto Mais Barato</h3>
            <div class="value" id="mais-barato-nome">-</div>
            <div class="detail" id="mais-barato-val">R$ 0,00</div>
        </div>
    </div>

    <div class="content-grid">
        <div class="form-section">
            <h2>Cadastrar Produto</h2>
            <form id="produto-form">
                <div class="form-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" required placeholder="Ex: Teclado Mecânico">
                </div>
                <div class="form-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" min="0" required placeholder="Ex: 15">
                </div>
                <div class="form-group">
                    <label for="preco">Preço Unitário (R$)</label>
                    <input type="number" id="preco" step="0.01" min="0" required placeholder="Ex: 199.90">
                </div>
                <button type="submit">Adicionar ao Estoque</button>
            </form>
        </div>

        <div class="table-section">
            <h2>Produtos em Estoque</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd.</th>
                            <th>Preço Unitário</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-produtos">
                        </tbody>
                </table>
                <div id="msg-vazio" class="empty-msg">Nenhum produto cadastrado ainda.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Banco de dados simulado na memória (Array)
    const estoque = [];

    const form = document.getElementById('produto-form');
    const tabela = document.getElementById('tabela-produtos');
    const msgVazio = document.getElementById('msg-vazio');

    // Elementos dos Cards de Inteligência
    const maiorQtdNome = document.getElementById('maior-qtd-nome');
    const maiorQtdVal = document.getElementById('maior-qtd-val');
    const maisCaroNome = document.getElementById('mais-caro-nome');
    const maisCaroVal = document.getElementById('mais-caro-val');
    const maisBaratoNome = document.getElementById('mais-barato-nome');
    const maisBaratoVal = document.getElementById('mais-barato-val');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Pegar valores dos inputs
        const nome = document.getElementById('nome').value;
        const quantidade = parseInt(document.getElementById('quantidade').value);
        const preco = parseFloat(document.getElementById('preco').value);

        // Adicionar o novo produto ao array
        estoque.push({ nome, quantidade, preco });

        // Limpar o formulário
        form.reset();

        // Atualizar a tela
        atualizarInterface();
    });

    function atualizarInterface() {
        // 1. Atualizar Tabela
        tabela.innerHTML = '';
        
        if (estoque.length === 0) {
            msgVazio.style.display = 'block';
            resetCards();
            return;
        } else {
            msgVazio.style.display = 'none';
        }

        estoque.forEach(prod => {
            const total = prod.quantidade * prod.preco;
            const linha = document.createElement('tr');
            linha.innerHTML = `
                <td>${prod.nome}</td>
                <td>${prod.quantidade}</td>
                <td>R$ ${prod.preco.toFixed(2)}</td>
                <td>R$ ${total.toFixed(2)}</td>
            `;
            tabela.appendChild(linha);
        });

        // 2. Calcular a "Inteligência" (Métricas)
        calcularMetricas();
    }

    function calcularMetricas() {
        let maiorQtdProd = estoque[0];
        let maisCaroProd = estoque[0];
        let maisBaratoProd = estoque[0];

        for (let i = 1; i < estoque.length; i++) {
            // Validar maior quantidade
            if (estoque[i].quantidade > maiorQtdProd.quantidade) {
                maiorQtdProd = estoque[i];
            }
            // Validar mais caro
            if (estoque[i].preco > maisCaroProd.preco) {
                maisCaroProd = estoque[i];
            }
            // Validar mais barato
            if (estoque[i].preco < maisBaratoProd.preco) {
                maisBaratoProd = estoque[i];
            }
        }

        // Mostrar nos cards
        maiorQtdNome.innerText = maiorQtdProd.nome;
        maiorQtdVal.innerText = `${maiorQtdProd.quantidade} unidades`;

        maisCaroNome.innerText = maisCaroProd.nome;
        maisCaroVal.innerText = `R$ ${maisCaroProd.preco.toFixed(2)}`;

        maisBaratoNome.innerText = maisBaratoProd.nome;
        maisBaratoVal.innerText = `R$ ${maisBaratoProd.preco.toFixed(2)}`;
    }

    function resetCards() {
        maiorQtdNome.innerText = '-';
        maiorQtdVal.innerText = '0 unidades';
        maisCaroNome.innerText = '-';
        maisCaroVal.innerText = 'R$ 0,00';
        maisBaratoNome.innerText = '-';
        maisBaratoVal.innerText = 'R$ 0,00';
    }
</script>

</body>
</html>
